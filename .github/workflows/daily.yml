name: Daily Horoscope Update
on:
  workflow_dispatch:
  schedule:
    - cron: '5 0 * * *'
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    # FIX 1: Grants the bot permission to push the JSON file
    permissions:
      contents: write  
      
    # FIX 2: Forces the runner to use the new Node.js 24 engine
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run Scraper
        run: python scraper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name 'Bot'
          git config --global user.email 'bot@example.com'
          git add horoscope.json
          git commit -m "Update Horoscope" || echo "No changes to commit"
          git push
